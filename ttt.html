<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="TTT.css"/>
</head>
<body>

  <!-- Decorative background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Confetti canvas (shown on win) -->
  <canvas id="confetti-canvas"></canvas>

  <div class="page">
    <div class="card">

      <!-- Title -->
      <div class="card-header">
        <h1 class="title">Tic-Tac-Toe</h1>
        <p class="subtitle">Two players &bull; First to three in a row wins</p>
      </div>

      <!-- Score Row -->
      <div class="score-row">
        <div class="score-pill x-pill">
          <span class="score-label">Player X</span>
          <span class="score-num" id="scoreX">0</span>
        </div>
        <div class="score-pill d-pill">
          <span class="score-label">Draws</span>
          <span class="score-num" id="scoreDraw">0</span>
        </div>
        <div class="score-pill o-pill">
          <span class="score-label">Player O</span>
          <span class="score-num" id="scoreO">0</span>
        </div>
      </div>

      <!-- Turn Indicator -->
      <div class="turn-display">
        <div class="turn-chip x-chip" id="turnChip">
          <span class="chip-dot"></span>
          <span id="turnText">Player X's turn</span>
        </div>
      </div>

      <!-- Game Board -->
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btnRestart">↺ Restart</button>
        <button class="btn btn-ghost" id="btnReset">Reset Scores</button>
      </div>

    </div>
  </div>

  <script src="ttt.js"></script>
</body>
</html>
